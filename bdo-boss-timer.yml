name: BDO SEA Boss Timer

on:
  schedule:
    # Runs every 30 minutes — GitHub Actions minimum reliable interval
    # (GitHub doesn't guarantee exact timing, but it's close enough)
    - cron: "*/30 * * * *"

  # Lets you click "Run workflow" manually in GitHub to test it
  workflow_dispatch:

jobs:
  send-boss-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run BDO Boss Webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bdo_sea_boss_webhook.py
