name: BDO SEA Boss Timer

on:
  schedule:
    # Runs every 5 minutes for accurate 15min and 5min alerts.
    - cron: "*/5 * * * *"

  # Lets you click "Run workflow" manually in GitHub to test it anytime
  workflow_dispatch:

jobs:
  send-boss-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run BDO Boss Webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bdo_sea_boss_webhook.py
